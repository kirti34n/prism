name: publish

# Publishes prism-think to PyPI when you push a version tag, e.g. `git tag v3.0.0 && git push --tags`.
# Uses PyPI Trusted Publishing (OIDC), so no API token is stored in the repo.
# One-time setup: on PyPI, add a trusted publisher for project "prism-think" pointing at
# owner kirti34n, repo prism, workflow "publish.yml".

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI trusted publishing (no stored token)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
